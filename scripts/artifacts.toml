# Artifact catalog for scripts/fake-runner.sh and scripts/fake-orchestrator.sh.
#
# Each section is one of the five runner inputs. Keys inside a section are
# names — human-readable handles for reusable artifacts. Values are the
# gs:// URI where the artifact lives (or will live, once published).
#
# Names are decoupled from any single job submission, so the same engine can
# be paired with different content versions and vice versa. To publish a new
# artifact under a name, add the entry here and then run
# `fake-orchestrator.sh --<type> <name> path/to/file`.
#
# The map entry's URI basename becomes the on-disk filename (the runner reads
# map_filename from the synthesized manifest, see
# src/bar_benchmarks/task/runner.py:79).

[engine]
# recoil-2025-04 = "gs://bar-experiments-bench-artifacts/engine/recoil-2025-04.tar.gz"

[bar_content]
# bar-1.2.3 = "gs://bar-experiments-bench-artifacts/bar-content/bar-1.2.3.tar.gz"

[overlay]
# benchmark-v1 = "gs://bar-experiments-bench-artifacts/overlays/benchmark-v1.tar.gz"

[map]
# tiny = "gs://bar-experiments-bench-artifacts/maps/tiny.smf"

[startscript]
# scenario-a = "gs://bar-experiments-bench-artifacts/scenarios/scenario-a.txt"
